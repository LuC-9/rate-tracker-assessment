name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Ensure seed parquet exists
        run: |
          if [ ! -f rates_seed.parquet ]; then
            echo "rates_seed.parquet is required for backend image build."
            exit 1
          fi

      - name: Build web image
        run: docker compose build web

      - name: Run backend tests
        run: docker compose run --rm --entrypoint "/app/scripts/entrypoint.sh test" web

      - name: Tear down containers
        if: always()
        run: docker compose down -v --remove-orphans

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build
